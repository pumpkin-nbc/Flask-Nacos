name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    name: Quality, docs, and package
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy flask_nacos

      - name: Check project consistency
        run: |
          python scripts/check_version.py
          python scripts/check_sensitive_info.py
          python scripts/check_docs.py
          python scripts/check_compatibility.py
          python scripts/check_api_snapshot.py
          python scripts/check_examples.py

      - name: Build
        run: python -m build

      - name: Check package (twine)
        run: twine check --strict dist/*

      - name: Check package contents
        run: python scripts/check_package.py

      - name: Smoke test package
        run: python scripts/smoke_test_package.py

  test:
    runs-on: ubuntu-latest
    name: py${{ matrix.python-version }} / ${{ matrix.label || 'latest Flask' }}
    strategy:
      fail-fast: false
      matrix:
        # Flask 1.x is exercised on Python 3.8 with its transitive stack pinned.
        include:
          - python-version: "3.8"
            label: "Flask 1.x"
            flask: "Flask>=1.0,<2.0 Werkzeug<2.0 Jinja2<3.0 markupsafe<2.1 itsdangerous<2.0 click<8.0"
          - python-version: "3.8"
            label: "Flask 2.x"
            flask: "Flask>=2.0,<3.0"
          - python-version: "3.8"
            label: "Flask 3.x"
            flask: "Flask>=3.0,<4.0"
          - python-version: "3.9"
            flask: ""
          - python-version: "3.10"
            flask: ""
          - python-version: "3.11"
            flask: ""
          - python-version: "3.12"
            flask: ""
          - python-version: "3.13"
            flask: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install specific Flask version
        if: ${{ matrix.flask != '' }}
        env:
          FLASK_SPEC: ${{ matrix.flask }}
        run: pip install $FLASK_SPEC

      - name: Test
        run: pytest

  sdk-compatibility:
    runs-on: ubuntu-latest
    name: Nacos SDK / ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "minimum 2.0.0"
            sdk_spec: "nacos-sdk-python==2.0.0"
            expected_version: "2.0.0"
          - label: "latest 2.x"
            sdk_spec: "nacos-sdk-python>=2.0.0,<3.0.0"
            expected_version: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and selected SDK
        env:
          NACOS_SDK_SPEC: ${{ matrix.sdk_spec }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install --force-reinstall --no-deps "$NACOS_SDK_SPEC"
          pip check

      - name: Check SDK surface
        env:
          EXPECTED_SDK_VERSION: ${{ matrix.expected_version }}
        run: |
          if [ -n "$EXPECTED_SDK_VERSION" ]; then
            python scripts/check_sdk_compatibility.py --expected-version "$EXPECTED_SDK_VERSION"
          else
            python scripts/check_sdk_compatibility.py
          fi

      - name: Run SDK-facing tests
        run: |
          pytest --no-cov \
            tests/test_client.py \
            tests/test_config_center.py \
            tests/test_discovery.py \
            tests/test_register.py \
            tests/test_deregister.py \
            tests/test_logging.py

  required-ci:
    runs-on: ubuntu-latest
    name: Required CI
    if: ${{ always() }}
    needs:
      - quality
      - test
      - sdk-compatibility
    steps:
      - name: Require every CI job to pass
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.test.result }}
          SDK_RESULT: ${{ needs.sdk-compatibility.result }}
        run: |
          test "$QUALITY_RESULT" = "success"
          test "$TEST_RESULT" = "success"
          test "$SDK_RESULT" = "success"
