name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: py${{ matrix.python-version }}${{ matrix.flask && format(' / {0}', matrix.flask) || ' / latest Flask' }}
    strategy:
      fail-fast: false
      matrix:
        # Layered Python x Flask compatibility matrix. Flask 1.x is only
        # exercised on Python 3.8 (its old Werkzeug pin is incompatible with
        # newer Python versions).
        include:
          - python-version: "3.8"
            flask: "Flask>=1.0,<2.0"
          - python-version: "3.8"
            flask: "Flask>=2.0,<3.0"
          - python-version: "3.8"
            flask: "Flask>=3.0,<4.0"
          - python-version: "3.9"
            flask: ""
          - python-version: "3.10"
            flask: ""
          - python-version: "3.11"
            flask: ""
          - python-version: "3.12"
            flask: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install specific Flask version
        if: ${{ matrix.flask != '' }}
        run: pip install "${{ matrix.flask }}"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy flask_nacos

      - name: Check version consistency
        run: python scripts/check_version.py

      - name: Scan for sensitive information
        run: python scripts/check_sensitive_info.py

      - name: Check docs
        run: python scripts/check_docs.py

      - name: Check compatibility
        run: python scripts/check_compatibility.py

      - name: Test
        run: pytest

      - name: Build
        run: python -m build

      - name: Check package (twine)
        run: twine check dist/*

      - name: Check package contents
        run: python scripts/check_package.py
