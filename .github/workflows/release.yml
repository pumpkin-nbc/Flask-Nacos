name: Release

# TestPyPI is a manual, master-only rehearsal. PyPI publishing is tag-only and
# additionally gated by the protected `pypi` GitHub Environment.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Validate and build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Require master for TestPyPI rehearsal
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: test "$GITHUB_REF" = "refs/heads/master"

      - name: Require release tag on master
        if: ${{ github.event_name == 'push' }}
        run: |
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master
          python scripts/check_release_tag.py "$GITHUB_REF_NAME"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint and type check
        run: |
          ruff check .
          mypy flask_nacos

      - name: Check project consistency
        run: |
          python scripts/check_version.py
          python scripts/check_sensitive_info.py
          python scripts/check_docs.py
          python scripts/check_compatibility.py
          python scripts/check_api_snapshot.py
          python scripts/check_examples.py

      - name: Test
        run: pytest

      - name: Build clean distributions
        run: |
          rm -rf dist build ./*.egg-info
          python -m build

      - name: Validate distributions
        run: |
          twine check --strict dist/*
          python scripts/check_package.py
          python scripts/smoke_test_package.py

      - name: Reject an existing TestPyPI version
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: python scripts/check_index_version.py testpypi

      - name: Reject an existing PyPI version
        if: ${{ github.event_name == 'push' }}
        run: python scripts/check_index_version.py pypi

      - name: Store verified distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/flask-nacos
    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/flask-nacos
    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
