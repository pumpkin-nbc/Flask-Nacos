name: Release

# Manual-only release workflow. It runs the full pre-release checks, builds
# the distributions, and uploads them to TestPyPI (default) or PyPI. Real PyPI
# is never published automatically: it requires explicitly choosing "pypi"
# when dispatching the workflow.
on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target package index"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy flask_nacos

      - name: Check version consistency
        run: python scripts/check_version.py

      - name: Scan for sensitive information
        run: python scripts/check_sensitive_info.py

      - name: Test
        run: pytest

      - name: Build
        run: python -m build

      - name: Check package (twine)
        run: twine check dist/*

      - name: Check package contents
        run: python scripts/check_package.py

      - name: Upload to TestPyPI
        if: ${{ github.event.inputs.repository == 'testpypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: twine upload --repository-url https://test.pypi.org/legacy/ dist/*

      - name: Upload to PyPI
        if: ${{ github.event.inputs.repository == 'pypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
